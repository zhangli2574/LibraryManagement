# 生产环境配置

# 数据源配置（示例：MySQL）
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/librarydb?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: your_secure_password
  
  # Redis 配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 16
          min-idle: 4
          max-wait: -1ms
  
  # JPA 配置
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: validate  # 生产环境：只验证表结构，不自动创建
    show-sql: false       # 不显示 SQL 语句
    properties:
      hibernate:
        format_sql: false
  
  # H2 Console（生产环境禁用）
  h2:
    console:
      enabled: false

# 日志配置
logging:
  level:
    root: WARN
    com.kyk.librarymanagement: INFO
    org.springframework.web: WARN
  file:
    name: logs/application.log  # 日志文件路径
    max-size: 10MB              # 单个日志文件最大大小
    max-history: 30             # 保留天数
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# JWT 配置（生产环境）
jwt:
  secret: ${JWT_SECRET:cHJvZC1zZWN1cmUtc2VjcmV0LWtleS1mb3ItbGlicmFyeS1tYW5hZ2VtZW50LXN5c3RlbS0yMDI2}  # 从环境变量读取，默认使用 Base64 编码的 Secret
  expiration: 604800000  # 7天（毫秒）

# 服务器配置
server:
  port: 8080
  # SSL 配置（如果需要 HTTPS）
  # ssl:
  #   enabled: true
  #   key-store: classpath:keystore.p12
  #   key-store-password: changeit
  #   key-store-type: PKCS12

# SpringDoc 配置（生产环境可选择性禁用）
springdoc:
  api-docs:
    enabled: false  # 生产环境通常禁用 API 文档
  swagger-ui:
    enabled: false  # 生产环境通常禁用 Swagger UI
