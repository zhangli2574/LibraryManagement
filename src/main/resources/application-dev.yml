# 开发环境配置

# 数据源配置（MySQL 8.0）
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/library?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: Zl@7573920
  
  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      password: Zl@7573920
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms
  
  # JPA 配置
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update  # 自动创建/更新表结构
    show-sql: true           # 显示 SQL 语句
    properties:
      hibernate:
        format_sql: true     # 格式化 SQL
  
  # H2 Console（开发环境禁用，使用 MySQL）
  h2:
    console:
      enabled: false

# 日志配置
logging:
  level:
    root: INFO
    com.kyk.librarymanagement: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE  # 显示 SQL 参数
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# JWT 配置（开发环境）
jwt:
  secret: ZGV2LXNlY3JldC1rZXktZm9yLWxpYnJhcnktbWFuYWdlbWVudC1zeXN0ZW0tMjAyNg==
  expiration: 604800000  # 7天（毫秒）
