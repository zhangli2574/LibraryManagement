# 开发环境配置

# 数据源配置
spring:
  datasource:
    url: jdbc:h2:mem:librarydb
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  # JPA 配置
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop  # 开发环境：每次启动重新建表
    show-sql: true           # 显示 SQL 语句
    properties:
      hibernate:
        format_sql: true     # 格式化 SQL
  
  # H2 Console 配置（仅开发环境）
  h2:
    console:
      enabled: true
      path: /h2-console

# 日志配置
logging:
  level:
    root: INFO
    com.kyk.librarymanagement: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE  # 显示 SQL 参数
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# JWT 配置（开发环境）
jwt:
  secret: dev-secret-key-for-library-management-system-2026
  expiration: 86400000  # 24小时（毫秒）
